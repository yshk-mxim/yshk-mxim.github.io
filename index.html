          '<div class="h-creds">'+S.credentials+'</div>'+
          '<div class="h-intro">'+S.intro+'</div>'+
        '</div>'+
      '</div>'+
      '<div class="links">'+lk+'</div>'+
    '</header>'+
    '<nav class="tabs">'+tb+'</nav>'+
    pn+
    '<footer>&copy; '+new Date().getFullYear()+' '+S.name+'</footer>';

  // Photo load
  var p = document.getElementById('ph');
  if(p){ p.onload=function(){p.classList.add('ok')}; p.onerror=function(){p.classList.add('no')}; }

  // Tab switching
  document.querySelectorAll('.tab').forEach(function(tab){
    tab.addEventListener('click', function(){
      document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on')});
      document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('on')});
      tab.classList.add('on');
      var panel = document.getElementById('p-'+tab.dataset.t);
      panel.classList.add('on');
      // Re-trigger animations
      panel.querySelectorAll('.card').forEach(function(c){
        c.classList.remove('fi');
        void c.offsetWidth;
        c.classList.add('fi');
      });
    });
  });
})();
</script>
</body>
</html>
